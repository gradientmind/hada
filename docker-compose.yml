services:
  moltbot:
    build:
      context: ./moltbot
      dockerfile: Dockerfile
    ports:
      - "18789:18789"
    env_file:
      - .env.local
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-minimax}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-Text-01}
    volumes:
      - moltbot-data:/root/.moltbot/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  moltbot-data:
